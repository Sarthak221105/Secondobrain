services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq red"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CORS_ORIGINS=http://localhost:3000
      # Firebase Admin SDK + google-cloud clients use this var automatically
      # if FIREBASE_CREDENTIALS_PATH isn't set.
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/firebase.json
    volumes:
      - ./backend/secrets:/secrets:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  es-data:
